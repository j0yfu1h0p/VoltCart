<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoltCart - Forgot Password</title>
    <link rel="stylesheet" href="shared-shell.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap");
      :root {
        --bg: #eef3f5;
        --ink: #102231;
        --muted: #5f6f7c;
        --line: #d7e0e6;
        --accent: #00695c;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Space Grotesk", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 20% 10%, #ffddb5 0, transparent 40%),
          radial-gradient(circle at 100% 100%, #b8f2ec 0, transparent 40%),
          var(--bg);
        display: grid;
        place-items: center;
        padding: 16px;
      }
      .card {
        width: min(500px, 100%);
        border: 1px solid var(--line);
        background: #fff;
        border-radius: 18px;
        padding: 22px;
      }
      h1 { margin-top: 0; }
      p { color: var(--muted); }
      label { display: block; margin-bottom: 12px; }
      input {
        width: 100%;
        margin-top: 6px;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 11px;
        font: inherit;
      }
      .btn {
        width: 100%;
        border: 0;
        border-radius: 10px;
        padding: 12px;
        background: var(--ink);
        color: #fff;
        font-weight: 700;
        cursor: pointer;
      }
      a { color: var(--accent); text-decoration: none; }
      .msg { font-family: "IBM Plex Mono", monospace; font-size: 0.85rem; color: var(--accent); }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Reset Password</h1>
      <p>Enter your account email. If it exists, you will receive a reset link.</p>

      <form id="forgotForm">
        <label>
          Email
          <input id="email" type="email" required placeholder="you@example.com" />
        </label>
        <button class="btn" type="submit">Send Reset Link</button>
      </form>

      <p><a href="login.html">Back to login</a></p>
      <p id="status" class="msg"></p>
    </main>

    <script>
      const form = document.getElementById("forgotForm");
      const statusEl = document.getElementById("status");
      const apiBaseUrl = "http://localhost:3000";

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value.trim().toLowerCase();
        statusEl.textContent = "Sending reset link...";

        const response = await fetch(`${apiBaseUrl}/auth/forgot-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email }),
        });

        const payload = await response.json().catch(() => ({}));
        if (!response.ok || !payload?.success) {
          statusEl.textContent = payload.message || "Could not send reset link.";
          return;
        }

        statusEl.textContent = payload.message || "If your account exists, a reset link has been sent.";
      });
    </script>
    <script src="shared-shell.js"></script>
  </body>
</html>
